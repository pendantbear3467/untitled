name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build Jar
        run: ./gradlew --no-daemon clean jar
      - name: Publish CurseForge
        if: ${{ secrets.CURSEFORGE_API_KEY != '' && secrets.CURSEFORGE_PROJECT_ID != '' }}
        run: ./gradlew --no-daemon curseforge -PcurseforgeApiKey=${{ secrets.CURSEFORGE_API_KEY }} -PcurseforgeProjectId=${{ secrets.CURSEFORGE_PROJECT_ID }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
