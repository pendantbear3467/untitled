name: Lint

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Checkstyle
        run: ./gradlew --no-daemon checkstyleMain
